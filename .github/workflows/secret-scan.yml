name: Secret Scan

# Hard gate preventing any secret (API key, token, private key, high-entropy
# credential) from entering the repository. Added after the 2026-06 audit found
# live secrets (Supabase service_role key, JWT_SECRET, GOOGLE_CLIENT_SECRET) in
# git history. This workflow stops RECURRENCE; the historical leak itself is
# remediated out-of-band by rotation (see tasks/audit-2026-06-19/README.md).
#
# gitleaks-action v2 is free for personal accounts and public repos; only
# GitHub Organizations require a GITLEAKS_LICENSE. This repo is a personal
# account, so no license is needed.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so PR/push commit ranges are scanned correctly.
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
