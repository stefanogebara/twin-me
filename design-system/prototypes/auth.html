<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TwinMe — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../tokens.css" />
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .card {
    width: 100%;
    max-width: 400px;
    background: rgba(13,12,18,0.60);
    backdrop-filter: blur(51px);
    -webkit-backdrop-filter: blur(51px);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 24px;
    padding: 36px 32px 32px;
  }

  .card-logo { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .logo-icon { width: 28px; height: 28px; background: rgba(193,126,44,0.25); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .logo-name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .beta-chip { display: inline-block; font-size: 10px; font-weight: 500; letter-spacing: 0.06em; background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; color: var(--text-muted); margin-left: 6px; }

  .card-title { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 34px; font-weight: 400; letter-spacing: -0.02em; color: var(--text-primary); margin: 20px 0 4px; line-height: 1.2; }
  .card-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }

  .google-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border-glass);
    border-radius: 12px;
    padding: 12px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    font-family: var(--font-ui);
    margin-bottom: 20px;
    transition: background 0.15s;
  }
  .google-btn:hover { background: rgba(255,255,255,0.12); }

  .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 12px; color: var(--text-muted); }

  .field { margin-bottom: 16px; }
  .field-label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; display: block; }

  .submit-btn {
    width: 100%;
    background: var(--text-primary);
    color: #110f0f;
    border: none;
    border-radius: 100px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-ui);
    margin-top: 8px;
    margin-bottom: 20px;
  }

  .footer-text { font-size: 12px; color: var(--text-muted); text-align: center; }
  .footer-link { color: var(--text-secondary); text-decoration: underline; text-underline-offset: 3px; cursor: pointer; }

  /* Google G icon */
  .g-icon { width: 18px; height: 18px; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="card">
    <div class="card-logo">
      <div class="logo-icon">✦</div>
      <span class="logo-name">Twin Me</span>
      <span class="beta-chip">BETA</span>
    </div>

    <div class="card-title">Sign in to your twin</div>
    <div class="card-sub">Your digital soul awaits</div>

    <button class="google-btn">
      <svg class="g-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <div class="field">
      <label class="field-label">Email</label>
      <input class="input" type="email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label class="field-label">Password</label>
      <input class="input" type="password" placeholder="••••••••" />
    </div>

    <button class="submit-btn">Sign in</button>

    <div class="footer-text">
      Don't have an account? <span class="footer-link">Get early access</span>
    </div>
  </div>
</body>
</html>
