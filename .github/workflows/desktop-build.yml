name: TwinMe Desktop · build

# Phase 1 CI: builds the Tauri 2 shell on push to main + on tags.
# Signs/notarizes when secrets are present (skipped on PRs).
#
# Required repo secrets for signing/notarization (add when ready to ship):
#   APPLE_CERTIFICATE                 base64 of Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD        password for the .p12
#   APPLE_SIGNING_IDENTITY            "Developer ID Application: <Name> (<TEAMID>)"
#   APPLE_ID                          Apple ID email
#   APPLE_APP_SPECIFIC_PASSWORD       app-specific password from appleid.apple.com
#   APPLE_TEAM_ID                     10-char team ID
#   TAURI_SIGNING_PRIVATE_KEY         ed25519 key for auto-updater (optional)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD password for the key

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop-build.yml'
    tags:
      - 'desktop-v*'
  pull_request:
    branches: [main]
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop-build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: 'macOS · Apple Silicon', runner: 'macos-14', target: 'aarch64-apple-darwin' }
          # Cross-compile the Intel target on an Apple Silicon runner (macos-14,
          # plentiful capacity) instead of a scarce macos-13 Intel runner that
          # chronically queued for hours. Apple Silicon builds x86_64-apple-darwin
          # natively via the installed Rust target + universal macOS SDK.
          - { name: 'macOS · Intel',         runner: 'macos-14', target: 'x86_64-apple-darwin'  }
          - { name: 'Windows · x64',         runner: 'windows-latest', target: 'x86_64-pc-windows-msvc' }
          - { name: 'Linux · x64',           runner: 'ubuntu-22.04', target: 'x86_64-unknown-linux-gnu' }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux deps (Ubuntu)
        if: matrix.platform.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ matrix.platform.runner }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.lock', 'desktop/src-tauri/Cargo.toml') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package.json

      - name: Install npm deps
        working-directory: desktop
        run: npm install

      # Run Rust unit tests once (Linux only — the tests are platform-agnostic:
      # config = file IO, sync = mockito HTTP, clips = in-memory sqlite, and the
      # active_window test is cfg(not(target_os = "macos")) so it runs here).
      # `tauri build` never executes #[cfg(test)] code, so without this step the
      # unit tests would compile-and-run nowhere.
      - name: Run Rust unit tests
        if: matrix.platform.runner == 'ubuntu-22.04'
        working-directory: desktop/src-tauri
        run: cargo test

      # Build UNSIGNED on every push, PR, AND tag release. We have no
      # code-signing certs yet (Phase 7), and tauri-action errors if
      # APPLE_CERTIFICATE is set-but-empty — so we never inject signing env
      # vars. desktop-v* tags therefore produce UNSIGNED installers that the
      # "Attach to GitHub Release" step below publishes. End users get a
      # Gatekeeper/SmartScreen warning until signing lands; the /download page
      # documents the "right-click → Open" / "More info → Run anyway" steps.
      # When certs are configured, re-add a tag-gated signed build step here.
      # The Cargo cache restores desktop/src-tauri/target, which includes the
      # bundle/ output from previous (older-version) builds. Without clearing it,
      # the upload globs below sweep up stale-version installers — e.g. a 0.1.0
      # .exe ending up attached to the 0.1.1 release. Remove only the bundle
      # output (compiled dependencies stay cached, so builds remain fast).
      - name: Clean stale bundles
        shell: bash
        run: rm -rf "desktop/src-tauri/target/${{ matrix.platform.target }}/release/bundle"

      - name: Build TwinMe Desktop (unsigned)
        working-directory: desktop
        # No --bundles: each platform produces its native default targets
        # (Mac: .app/.dmg; Win: .msi/.nsis; Linux: .deb/.appimage). Without
        # APPLE_SIGNING_IDENTITY env, tauri skips codesign instead of erroring.
        run: npm run build -- --target ${{ matrix.platform.target }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: twinme-desktop-${{ matrix.platform.target }}
          path: |
            desktop/src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.dmg
            desktop/src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.msi
            desktop/src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.exe
            desktop/src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.AppImage
            desktop/src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.deb
          if-no-files-found: warn
          retention-days: 14

      - name: Attach to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.dmg
            desktop/src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.msi
            desktop/src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.exe
            desktop/src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.AppImage
            desktop/src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.deb
          fail_on_unmatched_files: false
